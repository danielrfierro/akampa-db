name: Sync Akampa Data

on:
  schedule:
    # Diario 8:30am hora México (UTC-6) = 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch:   # permite disparar desde botón del dashboard o manualmente en GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Fetch Cloudbeds API & procesar datos
        env:
          CLOUDBEDS_API_KEY: ${{ secrets.CLOUDBEDS_API_KEY }}
        run: |
          ARGS=(
            --use_api
            --api_key "$CLOUDBEDS_API_KEY"
            --desde         2026-01-01
            --hasta         2027-12-31
            --desde_booking 2025-01-01
            --existing akampa-data-v3.js
            --output   akampa-data-v3.js
            --html     index.html
          )

          # Archivo combinado WeTravel (incluye La Ventana y Yucatán)
          if [ -f "reportes/Reporting_Payments_WeTravel.xlsx" ]; then
            echo "✓ WeTravel combinado encontrado"
            ARGS+=(
              --wetravel_lv            "reportes/Reporting_Payments_WeTravel.xlsx"
              --wetravel_lv_keyword    "La Ventana"
              --wetravel_yuc           "reportes/Reporting_Payments_WeTravel.xlsx"
              --wetravel_yuc_keyword   "Yucatan"
            )
          fi

          python scripts/akampa_processor_v3.py "${ARGS[@]}"

      - name: Commit y push
        run: |
          git config --global user.name  'akampa-bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add akampa-data-v3.js index.html
          git diff --staged --quiet || git commit -m "🔄 Sync $(date +'%Y-%m-%d %H:%M') UTC"
          git push
